<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 250" width="200" height="250">
  <!-- Tail -->
  <path d="M 138 190 Q 188 165 172 125 Q 158 88 176 58"
        stroke="#6B5B8E" stroke-width="13" fill="none" stroke-linecap="round"/>

  <!-- Body -->
  <ellipse cx="97" cy="182" rx="54" ry="48" fill="#8B7BB8"/>

  <!-- Belly -->
  <ellipse cx="97" cy="192" rx="30" ry="26" fill="#E8E0F5"/>

  <!-- Head -->
  <circle cx="97" cy="106" r="50" fill="#8B7BB8"/>

  <!-- Mortarboard base -->
  <ellipse cx="97" cy="60" rx="40" ry="8" fill="#2C2C2C"/>
  <!-- Mortarboard top -->
  <rect x="72" y="40" width="50" height="22" rx="3" fill="#2C2C2C"/>
  <!-- Tassel string -->
  <line x1="117" y1="44" x2="128" y2="62" stroke="#F5A623" stroke-width="2"/>
  <!-- Tassel -->
  <circle cx="130" cy="65" r="5" fill="#F5A623"/>
  <line x1="127" y1="68" x2="124" y2="78" stroke="#F5A623" stroke-width="1.5"/>
  <line x1="130" y1="70" x2="130" y2="80" stroke="#F5A623" stroke-width="1.5"/>
  <line x1="133" y1="68" x2="136" y2="78" stroke="#F5A623" stroke-width="1.5"/>

  <!-- Left ear -->
  <polygon points="52,82 38,36 78,70" fill="#8B7BB8"/>
  <!-- Right ear -->
  <polygon points="142,82 156,36 116,70" fill="#8B7BB8"/>
  <!-- Inner left ear -->
  <polygon points="55,79 44,42 73,68" fill="#C4A8E0"/>
  <!-- Inner right ear -->
  <polygon points="139,79 150,42 121,68" fill="#C4A8E0"/>

  <!-- Left eye white -->
  <ellipse cx="80" cy="104" rx="12" ry="13" fill="white"/>
  <!-- Left iris -->
  <ellipse cx="80" cy="104" rx="7" ry="11" fill="#5B8DB8"/>
  <!-- Left pupil -->
  <ellipse cx="80" cy="104" rx="4" ry="9" fill="#1A1A1A"/>
  <!-- Left shine -->
  <circle cx="83" cy="99" r="2.5" fill="white"/>

  <!-- Right eye white -->
  <ellipse cx="114" cy="104" rx="12" ry="13" fill="white"/>
  <!-- Right iris -->
  <ellipse cx="114" cy="104" rx="7" ry="11" fill="#5B8DB8"/>
  <!-- Right pupil -->
  <ellipse cx="114" cy="104" rx="4" ry="9" fill="#1A1A1A"/>
  <!-- Right shine -->
  <circle cx="117" cy="99" r="2.5" fill="white"/>

  <!-- Round glasses left -->
  <circle cx="80" cy="105" r="16" fill="none" stroke="#3A2A1A" stroke-width="2.5"/>
  <!-- Round glasses right -->
  <circle cx="114" cy="105" r="16" fill="none" stroke="#3A2A1A" stroke-width="2.5"/>
  <!-- Glasses bridge -->
  <line x1="96" y1="105" x2="98" y2="105" stroke="#3A2A1A" stroke-width="2.5"/>
  <!-- Glasses left arm -->
  <line x1="64" y1="104" x2="56" y2="108" stroke="#3A2A1A" stroke-width="2.5"/>
  <!-- Glasses right arm -->
  <line x1="130" y1="104" x2="138" y2="108" stroke="#3A2A1A" stroke-width="2.5"/>

  <!-- Nose -->
  <polygon points="97,118 92,124 102,124" fill="#FF8FAB"/>
  <!-- Mouth -->
  <path d="M 92,124 Q 97,131 102,124" stroke="#CC6677" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Whiskers left -->
  <line x1="24" y1="114" x2="85" y2="118" stroke="#8870A0" stroke-width="1.2"/>
  <line x1="24" y1="122" x2="85" y2="122" stroke="#8870A0" stroke-width="1.2"/>
  <line x1="24" y1="130" x2="85" y2="126" stroke="#8870A0" stroke-width="1.2"/>
  <!-- Whiskers right -->
  <line x1="109" y1="118" x2="170" y2="114" stroke="#8870A0" stroke-width="1.2"/>
  <line x1="109" y1="122" x2="170" y2="122" stroke="#8870A0" stroke-width="1.2"/>
  <line x1="109" y1="126" x2="170" y2="130" stroke="#8870A0" stroke-width="1.2"/>

  <!-- Front left paw -->
  <ellipse cx="72" cy="224" rx="22" ry="11" fill="#8B7BB8"/>
  <circle cx="60" cy="221" r="5" fill="#7A6AA8"/>
  <circle cx="72" cy="218" r="5.5" fill="#7A6AA8"/>
  <circle cx="84" cy="221" r="5" fill="#7A6AA8"/>

  <!-- Front right paw -->
  <ellipse cx="122" cy="224" rx="22" ry="11" fill="#8B7BB8"/>
  <circle cx="110" cy="221" r="5" fill="#7A6AA8"/>
  <circle cx="122" cy="218" r="5.5" fill="#7A6AA8"/>
  <circle cx="134" cy="221" r="5" fill="#7A6AA8"/>
</svg>
